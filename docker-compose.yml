version: '3.8'

services:

  # ==================== BASES DE DATOS ====================

  db-tasks:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: db_tasks
    ports:
      - "5433:5432"
    networks:
      - innovatech-network

  db-projects:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_projects
      POSTGRES_PASSWORD: password_projects
      POSTGRES_DB: db_projects
    ports:
      - "5434:5432"
    networks:
      - innovatech-network

  db-teams:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_teams
      POSTGRES_PASSWORD: password_teams
      POSTGRES_DB: db_teams
    ports:
      - "5435:5432"
    networks:
      - innovatech-network

  # ==================== MICROSERVICIOS ====================

  ms-tasks:
    build: ./ms-tasks
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://johndoe:randompassword@db-tasks:5432/db_tasks
      PORT: 3001
    depends_on:
      - db-tasks
    networks:
      - innovatech-network

  ms-projects:
    build: ./ms-projects
    restart: always
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://user_projects:password_projects@db-projects:5432/db_projects
      PORT: 3002
    depends_on:
      - db-projects
    networks:
      - innovatech-network

  ms-teams:
    build: ./ms-teams
    restart: always
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://user_teams:password_teams@db-teams:5432/db_teams
      PORT: 3003
    depends_on:
      - db-teams
    networks:
      - innovatech-network

  # ==================== BFF ====================

  bff:
    build: ./bff-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MS_TASKS_URL: http://ms-tasks:3001
      MS_PROJECTS_URL: http://ms-projects:3002
      MS_TEAMS_URL: http://ms-teams:3003
    depends_on:
      - ms-tasks
      - ms-projects
      - ms-teams
    networks:
      - innovatech-network

networks:
  innovatech-network:
    driver: bridge