services:

  # ==================== TRAEFIK - LOAD BALANCER ====================

  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - innovatech-network
    restart: always

  # ==================== BASES DE DATOS ====================

  db-tasks:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: db_tasks
    ports:
      - "5433:5432"
    volumes:
      - db-tasks-data:/var/lib/postgresql/data
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d db_tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-projects:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_projects
      POSTGRES_PASSWORD: password_projects
      POSTGRES_DB: db_projects
    ports:
      - "5434:5432"
    volumes:
      - db-projects-data:/var/lib/postgresql/data
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_projects -d db_projects"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-teams:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_teams
      POSTGRES_PASSWORD: password_teams
      POSTGRES_DB: db_teams
    ports:
      - "5435:5432"
    volumes:
      - db-teams-data:/var/lib/postgresql/data
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_teams -d db_teams"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==================== MICROSERVICIOS ====================

  db-bff:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user_bff
      POSTGRES_PASSWORD: password_bff
      POSTGRES_DB: db_bff
    ports:
      - "5436:5432"
    volumes:
      - db-bff-data:/var/lib/postgresql/data
    networks:
      - innovatech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_bff -d db_bff"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-tasks:
    build: ./ms-tasks
    image: innovatech-ms-tasks:latest
    restart: always
    # Ejecuta la migración antes de levantar el servicio
    command: sh -c "npx prisma migrate deploy && node dist/app.js"
    environment:
      DATABASE_URL: postgresql://johndoe:randompassword@db-tasks:5432/db_tasks
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db-tasks:
        condition: service_healthy
    networks:
      - innovatech-network

  ms-projects:
    build: ./ms-projects
    image: innovatech-ms-projects:latest
    restart: always
    command: sh -c "npx prisma migrate deploy && node dist/app.js"
    environment:
      DATABASE_URL: postgresql://user_projects:password_projects@db-projects:5432/db_projects
      PORT: 3002
      MS_TASKS_URL: http://ms-tasks:3001
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db-projects:
        condition: service_healthy
    networks:
      - innovatech-network

  ms-teams:
    build: ./ms-teams
    image: innovatech-ms-teams:latest
    restart: always
    command: sh -c "npx prisma migrate deploy && node dist/app.js"
    environment:
      DATABASE_URL: postgresql://user_teams:password_teams@db-teams:5432/db_teams
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db-teams:
        condition: service_healthy
    networks:
      - innovatech-network

  # ==================== BFF GATEWAY ====================
  # Sin puerto expuesto al host - Traefik balancea el trafico
  # Compose: docker compose up --build --scale bff=3

  bff:
    build: ./bff-gateway
    image: innovatech-bff:latest
    restart: always
    command: sh -c "npx prisma migrate deploy && node dist/app.js"
    environment:
      PORT: 3000
      MS_TASKS_URL: http://ms-tasks:3001
      MS_PROJECTS_URL: http://ms-projects:3002
      MS_TEAMS_URL: http://ms-teams:3003
      JWT_SECRET: ${JWT_SECRET}
      BFF_DATABASE_URL: postgresql://user_bff:password_bff@db-bff:5432/db_bff
    depends_on:
      db-bff:
        condition: service_healthy
      ms-tasks:
        condition: service_started
      ms-projects:
        condition: service_started
      ms-teams:
        condition: service_started
    networks:
      - innovatech-network

  # ==================== MONITOR DE RECURSOS ====================

  ms-monitor:
    build: ./ms-monitor
    image: innovatech-ms-monitor:latest
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MS_TASKS_URL: http://ms-tasks:3001
      MS_PROJECTS_URL: http://ms-projects:3002
      MS_TEAMS_URL: http://ms-teams:3003
      BFF_URL: http://bff:3000
    depends_on:
      - ms-tasks
      - ms-projects
      - ms-teams
      - bff
    networks:
      - innovatech-network

  # ==================== FRONTEND ====================

  frontend:
    build: ./frontend-web
    image: innovatech-frontend:latest
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_BFF_URL=http://localhost
    depends_on:
      - bff
    networks:
      - innovatech-network

volumes:
  db-tasks-data:
  db-projects-data:
  db-teams-data:
  db-bff-data:

networks:
  innovatech-network:
    driver: bridge

