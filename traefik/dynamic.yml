http:
  routers:
    bff:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: bff-service

  services:
    bff-service:
      loadBalancer:
        servers:
          - url: "http://bff:3000"
        healthCheck:
          path: /health
          interval: "10s"
          timeout: "3s"
